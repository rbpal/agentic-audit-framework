# v2 Corpus — Engagement Manifest
# One engagement × 4 quarters × 2 controls = 8 (control, quarter) entries.
# Loaded by agentic_audit.models.engagement.load_engagement.
# Replaces the v1 20-scenario manifest.yaml at the end of Step 2.
#
# Defect placement from privateDocs/step_02_corpus_v2.md §5:
#   Q1: clean across both controls (baseline)
#   Q2: DC-9 benign rate change WITH amendment; DC-2 clean
#   Q3: DC-9 figure_mismatch (attr C); DC-2 variance_explanation_inadequate (attr C)
#   Q4: DC-9 rate change WITHOUT amendment (attr D); DC-2 variance_no_explanation (attr B)
#
# Schema version: 2.0 (bump on breaking changes).

engagement:
  entity_name: Alpha Pension Fund
  year: 2025
  seed: 2025
  quarters:
    # ── Q1 — clean baseline ───────────────────────────────────────────
    - control_id: DC-2
      quarter: Q1
      defect: none
    - control_id: DC-9
      quarter: Q1
      defect: none

    # ── Q2 — DC-9 rate change, amendment on file (benign) ─────────────
    - control_id: DC-2
      quarter: Q2
      defect: none
    - control_id: DC-9
      quarter: Q2
      defect: dc9_rate_change_with_amendment

    # ── Q3 — two simultaneous tie-out defects (both on attribute C) ───
    - control_id: DC-2
      quarter: Q3
      defect: dc2_variance_explanation_inadequate
    - control_id: DC-9
      quarter: Q3
      defect: dc9_figure_mismatch

    # ── Q4 — missing evidence defects (DC-2 attr B, DC-9 attr D) ──────
    - control_id: DC-2
      quarter: Q4
      defect: dc2_variance_no_explanation
    - control_id: DC-9
      quarter: Q4
      defect: dc9_rate_change_without_amendment
