name: Terraform

# Runs the Terraform checks that DON'T require Azure credentials:
#   - fmt -check (formatting drift)
#   - init -backend=false (provider resolution)
#   - validate (syntactic + reference validation)
#
# Real `terraform plan` against the live backend is intentionally NOT in
# this workflow yet — it would require an OIDC-federated service principal
# with Reader on the state storage account + Contributor on the app RG.
# Adding that is a separate hardening task (federated credential, GitHub
# variable wiring, state-RG role assignment). Until then, contributors
# run `plan` locally against their own `az login` session.

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: fmt + init + validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          # Match local-dev pin (see versions.tf required_version >= 1.6).
          # Bump deliberately when local-dev bumps.
          terraform_version: 1.14.9
          terraform_wrapper: false

      - name: Terraform fmt -check -recursive
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
