# .pre-commit-config.yaml
# Pre-commit hooks — see https://pre-commit.com
# Update hook versions with: poetry run pre-commit autoupdate

default_language_version:
  python: python3.11

default_stages: [pre-commit]

repos:
  # ─── Ruff: lint + format in one tool ─────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ─── Mypy: type checks on src/ only, pre-push (slower) ───────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        files: ^src/
        stages: [pre-push]
        additional_dependencies:
          - pydantic>=2,<3
          - pydantic-settings>=2,<3
          - types-PyYAML

  # ─── Generic hygiene hooks ───────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

  # ─── Poetry: verify pyproject.toml and poetry.lock stay in sync ──
  - repo: https://github.com/python-poetry/poetry
    rev: 2.3.4
    hooks:
      - id: poetry-check
        args: [--lock]
        stages: [pre-push]

  # ─── Secret detection (defense-in-depth beyond .gitignore) ───────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.25.1
    hooks:
      - id: gitleaks
